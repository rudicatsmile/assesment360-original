openapi: 3.0.3
info:
  title: KepsekEval Admin Users API
  version: 1.0.0
  description: Dokumentasi endpoint CRUD manajemen pengguna untuk admin.
servers:
  - url: http://127.0.0.1:8000
paths:
  /admin/users/data:
    get:
      summary: List pengguna (pagination, search, filter)
      tags: [Admin Users]
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: role_id
          schema: { type: integer }
        - in: query
          name: department_id
          schema: { type: integer }
        - in: query
          name: status
          schema: { type: string, enum: [active, inactive] }
        - in: query
          name: per_page
          schema: { type: integer, default: 10, minimum: 5, maximum: 50 }
      responses:
        "200":
          description: OK
  /admin/users:
    post:
      summary: Tambah pengguna baru
      tags: [Admin Users]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: Created
        "422":
          description: Validation error
  /admin/users/{id}:
    get:
      summary: Detail pengguna
      tags: [Admin Users]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
    patch:
      summary: Update pengguna
      tags: [Admin Users]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: Updated
        "422":
          description: Validation error
    delete:
      summary: Soft delete pengguna
      tags: [Admin Users]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted (soft delete)
        "422":
          description: Business rule error
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: laravel_session
  schemas:
    UserCreateRequest:
      type: object
      required: [name, email, password, role_id, is_active]
      properties:
        name: { type: string, example: "Nama Lengkap" }
        email: { type: string, format: email, example: "user@example.com" }
        phone_number: { type: string, nullable: true, example: "081234567890" }
        password: { type: string, minLength: 8, example: "password123" }
        role_id: { type: integer, example: 2 }
        department_id: { type: integer, nullable: true, example: 1 }
        is_active: { type: boolean, example: true }
    UserUpdateRequest:
      type: object
      required: [name, email, role_id, is_active]
      properties:
        name: { type: string, example: "Nama Update" }
        email: { type: string, format: email, example: "user-update@example.com" }
        phone_number: { type: string, nullable: true, example: "081111111111" }
        role_id: { type: integer, example: 3 }
        department_id: { type: integer, nullable: true, example: 2 }
        is_active: { type: boolean, example: false }
